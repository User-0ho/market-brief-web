<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI Market Brief</title>

<style>
body {
  background:#0b1220;
  color:#e5e7eb;
  font-family:sans-serif;
  padding:30px;
}

.card {
  background:#111827;
  padding:20px;
  margin-bottom:20px;
  border-radius:12px;
}

.item {
  cursor:pointer;
  padding:10px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<h1>📊 AI Market Brief</h1>

<div id="latest" class="card"></div>

<h2>📚 과거 리포트</h2>
<div id="history" class="card"></div>

<script>
const API = "https://market-brief-server.onrender.com";

// 최신
async function loadLatest() {
  const res = await fetch(API + "/news/latest");
  const data = await res.json();

  if (data.error) return;

  document.getElementById("latest").innerHTML = `
    <h2>📌 최신 리포트</h2>
    <pre>${data.report}</pre>
    <p>조회수: ${data.views}</p>
  `;
}

// 목록
async function loadHistory() {
  const res = await fetch(API + "/news/history");
  const data = await res.json();

  document.getElementById("history").innerHTML =
    data.reverse().map(r => `
      <div class="item" onclick="loadDetail('${r.id}')">
        📄 ${r.createdAt}
        (조회수: ${r.views})
      </div>
    `).join("");
}

// 상세
async function loadDetail(id) {
  const res = await fetch(API + "/news/" + id);
  const data = await res.json();

  document.getElementById("latest").innerHTML = `
    <h2>📌 리포트 상세 (${data.level})</h2>
    <pre>${data.report}</pre>
    <p>조회수: ${data.views}</p>
  `;
}

loadLatest();
loadHistory();
</script>

</body>
</html>
