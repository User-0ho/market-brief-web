<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>AI Market Brief</title>
</head>
<body style="background:#0f172a;color:#e2e8f0;padding:40px;">

<h1>📊 AI Market Brief</h1>

<button onclick="loadReport()">오늘 리포트 가져오기</button>

<pre id="output">버튼을 눌러주세요</pre>

<script>
async function loadReport() {
  try {
    const res = await fetch("https://market-brief-server.onrender.com/news", {
      method: "GET",
      mode: "cors"
    });

    const data = await res.json();

    if (data.report) {
      document.getElementById("output").innerText = data.report;
    } else {
      document.getElementById("output").innerText = JSON.stringify(data);
    }

  } catch (err) {
    document.getElementById("output").innerText = "에러 발생: " + err;
  }
}
</script>

</body>
</html>
