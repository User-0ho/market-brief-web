<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>AI Market Brief</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 40px;
    }
    h1 {
      color: #38bdf8;
    }
    button {
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      color: black;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 20px;
    }
    pre {
      background: #020617;
      padding: 20px;
      white-space: pre-wrap;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>📊 AI Market Brief</h1>

  <button onclick="loadReport()">오늘 리포트 가져오기</button>

  <pre id="output">버튼을 눌러 리포트를 불러오세요</pre>

  <script>
    async function loadReport() {
      const res = await fetch("https://market-brief-server.onrender.com/news");
      const data = await res.json();

      if (data.report) {
        document.getElementById("output").innerText = data.report;
      } else {
        document.getElementById("output").innerText = "에러: " + JSON.stringify(data);
      }
    }
  </script>

</body>
</html>
